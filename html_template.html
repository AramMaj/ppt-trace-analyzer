<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; padding: 24px; }
h1 { font-size: 1.6em; margin-bottom: 4px; }
.subtitle { color: #666; font-size: .9em; margin-bottom: 20px; }
.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center; }
.card .value { font-size: 1.5em; font-weight: 700; color: #1a1a2e; }
.card .label { font-size: .75em; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
.section { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.section h2 { font-size: 1.1em; color: #16213e; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #e8e8e8; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }
.chart-box { position: relative; height: 280px; }
.chart-box.tall { height: 380px; }
.chart-box canvas { width: 100% !important; height: 100% !important; }
table { width: 100%; border-collapse: collapse; font-size: .85em; }
th { background: #f8f9fa; color: #444; padding: 8px 10px; text-align: right; font-weight: 600; border-bottom: 2px solid #dee2e6; white-space: nowrap; }
th:first-child { text-align: left; }
td { padding: 6px 10px; text-align: right; border-bottom: 1px solid #eee; white-space: nowrap; }
td:first-child { text-align: left; font-weight: 500; }
tr:hover { background: #f5f7fa; }
.table-wrap { overflow-x: auto; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .75em; font-weight: 600; margin: 1px; }
.tag-high { background: #ffe0e0; color: #c0392b; }
.tag-med { background: #fff3cd; color: #856404; }
.tag-low { background: #d4edda; color: #155724; }
.tag-ok { background: #e8f5e9; color: #2e7d32; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; font-size: .8em; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.cmp-better { background-color: #d4edda !important; color: #155724 !important; font-weight: 600; }
.cmp-worse { background-color: #f8d7da !important; color: #721c24 !important; font-weight: 600; }
.trace-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.trace-tab { padding: 8px 16px; border-radius: 8px; background: #e8e8e8; font-size: .85em; font-weight: 600; color: #555; }
.trace-tab.active { background: #1a1a2e; color: #fff; }
.compare-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
.trace-summary { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.trace-summary h3 { font-size: .95em; margin-bottom: 8px; color: #1a1a2e; }
.trace-summary table { width: 100%; font-size: .8em; }
.trace-summary td { padding: 3px 6px; border: none; }
.trace-summary td:first-child { color: #888; }
.trace-summary td:last-child { text-align: right; font-weight: 600; }
.comp-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
.comp-col { flex: 1; min-width: 300px; background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.comp-col h3 { font-size: .95em; margin-bottom: 12px; color: #16213e; }
</style>
</head>
<body>
{{BODY}}
{{CHART_SCRIPT}}
<script>
const COLORS = { fwd: '#4e79a7', bwd: '#e15759', ag: '#76b7b2', rs: '#f28e2b', opt: '#59a14f', tp_ag: '#af7aa1', tp_rs: '#ff9da7', tp_ar: '#9c755f', fwd_cmp: '#4e79a7', bwd_cmp: '#e15759', fsdp_comm: '#76b7b2', tp_comm: '#af7aa1' };

function doughnutChart(id, labels, values, colors) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } } } } });
}

function barChart(id, labels, datasets, opts) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  new Chart(ctx, { type: 'bar', data: { labels, datasets }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#eee' } } }, plugins: { legend: { display: !!opts?.legend, position: 'bottom', labels: { boxWidth: 12, padding: 8, font: { size: 10 } } } } } });
}

if (DATA.phasePie) {
  doughnutChart('phasePie', DATA.phasePie.labels, DATA.phasePie.values, DATA.phasePie.colors);
}
if (DATA.utilChart) {
  barChart('utilChart', DATA.utilChart.labels, [{ label: 'GPU util', data: DATA.utilChart.values, backgroundColor: DATA.utilChart.values.map(v => v >= 100 ? '#4e79a7' : v >= 70 ? '#76b7b2' : '#e15759'), borderRadius: 3 }]);
}
if (DATA.compCommChart) {
  barChart('compCommChart', DATA.compCommChart.labels, DATA.compCommChart.datasets, { legend: true });
}
if (DATA.overlapChart) {
  barChart('overlapChart', DATA.overlapChart.labels, [{ label: 'Efficiency', data: DATA.overlapChart.values, backgroundColor: DATA.overlapChart.values.map(v => v >= 0.7 ? '#e15759' : v >= 0.3 ? '#f28e2b' : '#76b7b2'), borderRadius: 3 }], { legend: false });
}
if (DATA.ctcChart) {
  const vals = DATA.ctcChart.values.map(v => v === null ? 0 : v);
  barChart('ctcChart', DATA.ctcChart.labels, [{ label: 'Compute-to-comm', data: vals, backgroundColor: vals.map(v => v >= 5 ? '#4e79a7' : v >= 2 ? '#76b7b2' : '#e15759'), borderRadius: 3 }], { legend: false });
}
if (DATA.compare) {
  if (DATA.compare.keyMetrics) {
    barChart('cmpKeyMetrics', DATA.compare.keyMetrics.labels, DATA.compare.keyMetrics.datasets, { legend: true });
  }
  if (DATA.compare.phaseTimes) {
    barChart('cmpPhaseTimes', DATA.compare.phaseTimes.labels, DATA.compare.phaseTimes.datasets, { legend: true });
  }
  if (DATA.compare.mfu) {
    barChart('cmpMfu', DATA.compare.mfu.labels, DATA.compare.mfu.datasets, { legend: true });
  }
  if (DATA.compare.commRatios) {
    barChart('cmpCommRatios', DATA.compare.commRatios.labels, DATA.compare.commRatios.datasets, { legend: true });
  }
}
</script>
</body>
</html>
