<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      background: #fff;
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 40px 60px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 2px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 12px;
      color: #999;
      margin-bottom: 28px;
    }

    /* ── KPI strip ── */
    .kpi-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 28px;
    }

    .kpi-value {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
      color: #111;
    }

    .kpi-label {
      font-size: 9px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-top: 2px;
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 32px;
    }

    .section h2 {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 16px;
      padding-bottom: 6px;
      border-bottom: 2px solid #222;
    }

    .section h3 {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 12px;
    }

    .chart-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 800px) {
      .chart-row {
        grid-template-columns: 1fr;
      }
    }

    .chart-box {
      position: relative;
      height: 260px;
    }

    .chart-box.tall {
      height: 340px;
    }

    .chart-box canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Tables ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    th {
      background: #f5f5f5;
      padding: 6px 7px;
      text-align: right;
      font-weight: 600;
      border-bottom: 1px solid #ccc;
      white-space: nowrap;
    }

    th:first-child {
      text-align: left;
    }

    td {
      padding: 4px 7px;
      text-align: right;
      border-bottom: 1px solid #eee;
    }

    td:first-child {
      text-align: left;
      font-weight: 500;
      white-space: nowrap;
    }

    tr:hover td {
      background: #fafafa;
    }

    .table-wrap {
      overflow-x: auto;
    }

    /* ── Tags (colored text only, no background) ── */
    .tag {
      font-size: 11px;
      margin-right: 4px;
      white-space: nowrap;
    }

    .tag-cell {
      text-align: left !important;
    }

    .tag-cell .tag {
      white-space: nowrap;
    }

    td.ol {
      background: #fff3cd;
    }

    tr:hover td.ol {
      background: #fff3cd;
    }

    .tag-high {
      color: #c0392b;
    }

    .tag-med {
      color: #b8860b;
    }

    .tag-low {
      color: #1a7a2e;
    }

    .tag-ok {
      color: #2e7d32;
    }

    /* ── Legend dots for phase table ── */
    .legend-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 4px;
      vertical-align: baseline;
    }

    /* ── Comparison page ── */
    .trace-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .trace-tab {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .trace-tab.active {
      background: #333;
    }

    .cmp-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      margin-bottom: 28px;
      border: 1px solid #ddd;
    }

    .cmp-card {
      flex: 1 0 180px;
      background: #fafafa;
      padding: 14px 16px;
    }

    .cmp-card h3 {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .cmp-card table {
      font-size: 11px;
      width: 100%;
    }

    .cmp-card td {
      padding: 2px 4px;
      border: none;
      background: transparent !important;
    }

    .cmp-card td:first-child {
      color: #888;
    }

    .cmp-card td:last-child {
      text-align: right;
      font-weight: 600;
    }

    .comp-row {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .comp-col {
      flex: 1;
      min-width: 280px;
      padding: 0;
    }

    .cmp-better {
      background-color: #e8f5e9 !important;
      color: #1a7a2e !important;
      font-weight: 600;
    }

    .cmp-worse {
      background-color: #ffe0e0 !important;
      color: #c0392b !important;
      font-weight: 600;
    }

    /* ── Comparison table (compact, wrapping) ── */
    .cmp-table td {
      white-space: normal;
      font-size: 10px;
      padding: 3px 6px;
    }

    .cmp-table td:first-child {
      white-space: nowrap;
    }

    .cmp-table th {
      font-size: 10px;
      padding: 4px 6px;
    }
  </style>
</head>

<body>
  {{BODY}}
  {{CHART_SCRIPT}}
  <script>
    const COLORS = { fwd: '#4e79a7', bwd: '#e15759', ag: '#76b7b2', rs: '#f28e2b', opt: '#59a14f', tp_ag: '#af7aa1', tp_rs: '#ff9da7', tp_ar: '#9c755f', fwd_cmp: '#4e79a7', bwd_cmp: '#e15759', fsdp_comm: '#76b7b2', tp_comm: '#af7aa1' };

    function doughnutChart(id, labels, values, colors) {
      const ctx = document.getElementById(id);
      if (!ctx) return;
      new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, padding: 6, font: { size: 11 } } } } } });
    }

    function barChart(id, labels, datasets, opts) {
      const ctx = document.getElementById(id);
      if (!ctx) return;
      const yTickOpts = opts?.unitY ? { font: { size: 10 }, callback: function(value) { return Number.isInteger(value) ? value + (opts.unitY || '') : ''; } } : { font: { size: 10 } };
      new Chart(ctx, { type: 'bar', data: { labels, datasets }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false }, ticks: { font: { size: 10 } } }, y: { beginAtZero: true, grid: { color: '#eee', drawBorder: false }, ticks: yTickOpts } }, plugins: { legend: { display: !!opts?.legend, position: 'bottom', labels: { boxWidth: 10, padding: 6, font: { size: 10 } } } } } });
    }

    if (DATA.phasePie) {
      doughnutChart('phasePie', DATA.phasePie.labels, DATA.phasePie.values, DATA.phasePie.colors);
    }
    if (DATA.busyChart) {
      barChart('busyChart', DATA.busyChart.labels, [{ label: 'GPU busy', data: DATA.busyChart.values, backgroundColor: DATA.busyChart.values.map(v => v >= 90 ? '#4e79a7' : v >= 50 ? '#76b7b2' : '#e15759') }], { unitY: '%' });
    }
    if (DATA.compCommChart) {
      barChart('compCommChart', DATA.compCommChart.labels, DATA.compCommChart.datasets, { legend: true, unitY: '\u00B5s' });
    }
    if (DATA.overlapChart) {
      barChart('overlapChart', DATA.overlapChart.labels, [{ label: 'Share of wall span', data: DATA.overlapChart.values, backgroundColor: DATA.overlapChart.values.map(v => v >= 70 ? '#e15759' : v >= 30 ? '#f28e2b' : '#76b7b2') }], { legend: false, unitY: '%' });
    }
    if (DATA.ctcChart) {
      const vals = DATA.ctcChart.values.map(v => v === null ? 0 : v);
      barChart('ctcChart', DATA.ctcChart.labels, [{ label: 'Compute-to-comm', data: vals, backgroundColor: vals.map(v => v >= 5 ? '#4e79a7' : v >= 2 ? '#76b7b2' : '#e15759') }], { legend: false, unitY: 'x' });
    }
    if (DATA.compare) {
      if (DATA.compare.keyMetrics) {
        barChart('cmpKeyMetrics', DATA.compare.keyMetrics.labels, DATA.compare.keyMetrics.datasets, { legend: true, unitY: DATA.compare.keyMetrics.unitY });
      }
      if (DATA.compare.phaseTimes) {
        barChart('cmpPhaseTimes', DATA.compare.phaseTimes.labels, DATA.compare.phaseTimes.datasets, { legend: true, unitY: DATA.compare.phaseTimes.unitY });
      }
      if (DATA.compare.mfu) {
        barChart('cmpMfu', DATA.compare.mfu.labels, DATA.compare.mfu.datasets, { legend: true, unitY: DATA.compare.mfu.unitY });
      }
      if (DATA.compare.commRatios) {
        barChart('cmpCommRatios', DATA.compare.commRatios.labels, DATA.compare.commRatios.datasets, { legend: true, unitY: DATA.compare.commRatios.unitY });
      }
    }
  </script>
</body>

</html>
